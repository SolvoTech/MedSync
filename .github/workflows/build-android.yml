# .github/workflows/build-android.yml
name: Build & Publish Android

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build-and-release:
    name: Build APK/AAB & Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get short commit SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT

      - name: Extract version from pubspec.yaml
        id: pubspec
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          echo "app_version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Create .env file
        run: |
          cat > .env << EOF
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          EOF

      - name: Decode & setup keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/medsync.jks
          cat > android/key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=medsync.jks
          EOF

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos

      - name: Build APK
        run: |
          flutter build apk --release \
            --dart-define=APP_VERSION=${{ steps.pubspec.outputs.app_version }}+${{ steps.vars.outputs.sha_short }}

      - name: Build Android App Bundle
        run: |
          flutter build appbundle --release \
            --dart-define=APP_VERSION=${{ steps.pubspec.outputs.app_version }}+${{ steps.vars.outputs.sha_short }}

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/MedSync-${{ steps.pubspec.outputs.app_version }}+build.${{ steps.vars.outputs.sha_short }}.apk

      - name: Rename AAB
        run: |
          mv build/app/outputs/bundle/release/app-release.aab \
             build/app/outputs/bundle/release/MedSync-${{ steps.pubspec.outputs.app_version }}+build.${{ steps.vars.outputs.sha_short }}.aab

      - name: Resolve APK path
        id: apk
        run: |
          APK_PATH=$(ls build/app/outputs/flutter-apk/MedSync-*.apk | head -n 1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Resolve AAB path
        id: aab
        run: |
          AAB_PATH=$(ls build/app/outputs/bundle/release/MedSync-*.aab | head -n 1)
          echo "aab_path=$AAB_PATH" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MedSync-APK-${{ steps.vars.outputs.sha_short }}
          path: ${{ steps.apk.outputs.apk_path }}
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: MedSync-AAB-${{ steps.vars.outputs.sha_short }}
          path: ${{ steps.aab.outputs.aab_path }}
          retention-days: 30

      - name: Prepare release metadata
        id: release_meta
        run: |
          TAG_NAME="v${{ steps.pubspec.outputs.app_version }}-${{ github.ref_name }}-${{ steps.vars.outputs.sha_short }}"
          RELEASE_NAME="MedSync ${{ steps.pubspec.outputs.app_version }} (${{ github.ref_name }} @ ${{ steps.vars.outputs.sha_short }})"
          IS_PRERELEASE=false
          if [ "${{ github.ref_name }}" = "develop" ]; then
            IS_PRERELEASE=true
          fi
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "release_name=$RELEASE_NAME" >> $GITHUB_OUTPUT
          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT

      - name: Publish Android artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          name: ${{ steps.release_meta.outputs.release_name }}
          prerelease: ${{ steps.release_meta.outputs.is_prerelease }}
          generate_release_notes: true
          files: |
            ${{ steps.apk.outputs.apk_path }}
            ${{ steps.aab.outputs.aab_path }}

      - name: Write job summary
        run: |
          echo "## ✅ Build Sukses" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Info | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Versi App** | ${{ steps.pubspec.outputs.app_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit SHA** | \`${{ steps.vars.outputs.sha_short }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Release Tag** | \`${{ steps.release_meta.outputs.tag_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **APK File** | \`${{ steps.apk.outputs.apk_path }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **AAB File** | \`${{ steps.aab.outputs.aab_path }}\` |" >> $GITHUB_STEP_SUMMARY
